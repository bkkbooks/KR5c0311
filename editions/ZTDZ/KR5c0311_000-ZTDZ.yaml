front:
  text: 通幽訣蘭七訣曰寳丹本乎一物而生二二主火寄位丙丁生於甲初九潜龍一爻生建陽在子天符發泄驚蟄受氣於母母者土也道生於一一生二二生三三者陽極之父母陽者天地之精故名三五與一還丹之本基天符者日信日者天地之元精五行之始照曜以事繼日以日繼月以月繼時以時繼年所以記遠近别異同也初分混沌精氣陰陽斗建十二辰推移運轉刻漏不停發泄交媾萬物化生而成形天符者信也能發泄萬物運動返本而成精氣潜運結爲精精化爲砂色禀南方丙丁火外陽而内陰主男日之陽魂日月之華氣照曜天地太陽太陰冲和之氣交騰受氣一千八十年結精氣丹砂天符照曜又一千八十年成丹砂名硃砂也陽中陰號曰太陽朱雀石主水元和之氣未足曰丹砂一云天鉛帝男精龍女血化南作北抽出未化爲陰汞主水水數一故云汞生於鉛陽爲臣也天鉛神水天符運動照曜丹砂養育又一千八十年天火化爲太陽陽氣足陰氣衰陽氣盛滿流溢迴而自生色禀北方壬癸水外陰而内陽主女月之陰魂非人間之凡物故之赤水中自生者流爲陽汞名曰天鉛之精黃芽之祖是日月之華氣水化爲天然還丹天符又照曜一千八十年合四千三百二十年元氣足自然成還丹天然伏火黑色轉北成西西主金金數四水基也故知三五與一天地至精三者火也五者砂之父母一者砂之元祖輪還運轉精氣元和相感成形不越於一一者夫道之本宗水也學者不悟硃砂是鉛鉛中生子是金即一物陰陽運動自制伏陽中陰陰中陽玄中玄名曰玄武石轉水成金故云砂産於金陰爲君鈆金天符運動都計四千三百二十年照曜父母養育成天鉛自然還丹訣曰後聖用火喻爻象月計三百六十時年計氣候四千三百二十時合四千三百二十年氣候喻合天符自然還丹故云硃砂汞金水龍虎五行合體歸一無二得五以地符依卦節氣候運動以成金丹訣曰其丹砂精魂出自中華十二分野内主一宫坤地西南隅其寳天地至精元氣以日月天符運動交媾在五五者戊己中宫土也所生之處生於福德山崗形勢之地氣候骨肉俱全水陸草木秀茂土石堅貞異境神靈衛侍陰氣施陽氣泄包含孕育照曜精氣得土而生化爲丹砂有砂之處或晝或夜或初晴之後或陰暗之時即有氣候光彩往往如日光而出或没或見唯採匠而鑒之今具載所出土産管屬州縣山谷之名並異名等曰丹砂曰硃砂曰硃鉛曰鉛中金曰天鉛曰火鉛曰神水曰華池曰陰汞曰陽汞曰陽中陰曰陰中陽曰水銀曰五采石曰五金曰七寳主曰還丹曰天生芽曰黄芽曰五行之胎
