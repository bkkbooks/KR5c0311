body:
  text: 州縣山谷名桂府辰錦衡朗邵勾漏都雲象都永郴容湖南等界山石巖谷形勢滋茂處並有如要採砂精不烹鍊天然自生出者但於曾採砂處打石及穴填處不問新舊即有之新阬及古者不定有之丹砂光眀在床有君臣自然四面有朝揖而生者色如未開紅蓮通透曜日或如芙蓉紫色通透形貌如笋者或片段稜角成就分眀通光並爲上品或如雲母片白光者通透一云白馬牙或顆粒兩數至一二斤者在石中採得顆粒碎紅光明者或片段稜角白光者入水中不見者或青光分眀稜角成就者並爲中品與上品同用堪爲至藥或有鐵色者及竹溪谷土穴並水中採得者或顆不定分兩多少及掬得末砂並爲下品但川源滋茂抽得液制伏只得治世疾不延駐不堪爲至藥亦比人之百寮爲上中品無名位者爲庶品則卑賤無自專之分不能致人非常之事故喻云只治世疾不延駐天符日春秋天符之日日者陽之精魂天之理也故照曜光眀淮南子曰積陽之熱氣交騰爲火火之精爲日光明威精之義也又云日生於甲重陽之位火生於震震位辰巳震爲長男巽爲中男南火之父母火曰曾木曰青萬物之使故云曾青陰符月春秋陰符之月者陰之精魄地之理也照曜光明淮南子曰積陰之寒氣交騰爲水水之精爲月滿而缺者感日之義也又云月生於庚重陰之位水生於兌兌爲少女水之父母所以男依日東立女之象月生而西端丹徑之丹砂日月之華氣性命之根基與内外元和般載成形餌之故長生不死日月之感精故曰陰符月之所生日之所育陰陽用事生成依於母母曰土日月二寳是天地至靈卑情感精變化照曜結成砂始名朱雀石七十二石最尊莫過於汞感於二十四氣通於二十四名變化成丹鳥餐成鳳蛇餌成龍人食長生天地同壽收人魂魄返老歸童呼吸風雲玉女來侍即大丹之功力也訣曰鉛者即砂中抽出之液主水陽中陰汞也從砂中自生出者主金陰中陽汞訣曰是以不容之木受制於金金孕水安水必存金木孕火制火必假木所以鉛水制汞水鉛火制汞火水合其性火合其形訣曰鉛水者是砂中自生出者主陽汞汞水者是水中抽出者液主陰汞是鉛水制汞水又云鉛火者自生之金汞火者是抽出之液也水是鉛火制汞火多不曉此故名金汞道耶日者是太陽之火精即朱汞爲龍是也月者是太陰之水精是鉛銀爲虎是也龍者陽之氣九之極數木之無也虎者陰之氣四之極數金之有也訣曰以無制有合成其道故云丹砂木精得金乃並參銖不偏至聖至靈世人不悟見金視之如土藥歌曰太玄陰符道生陰陽陰陽生五行五行合而爲還丹故名龍虎天有三尊日月星地有三尊江河海人有三尊君父師身有三尊三丹田藥有三尊土火金故乾坤者上下父也坎離者水火爲藥也震巽者運卦也運經三載自然還丹即太元之氣何以不成丹矣訣曰計一萬二千九百六十時大小月及閏月並不在用限歸其實數也一氣不足與瓦礫無殊萬象精通神靈自契訣曰陰陽運轉氣化爲精精化爲朱朱化爲汞汞化爲金金化爲藥故號金砂名曰大還大還者返歸之義丹者赤色之名汞者本體是金金水相制故號金砂運本體得稱大還丹土是陰符戊己中宫五符一云五氣金鼎訣曰五氣制伏不飛能生五彩返歸其母餌之長生訣曰丹砂流汞父戊己黄金母母數五五是土用土爲鼎制伏號曰金鼎土能生萬物金是土生故爲金父母者金本生土故曰土母水以土爲鬼土墳水不起戊己之功名曰五符汞者非土不可制伏土王金鄉三物俱求依象帝王如人主有道即四方來貢但辨得眞鉛汞二物即是第一鼎法故爲三物一家都歸戊己金水無土制馭不成丹土母季王十八日餘日休廢囚死藏伏凡伏鍊金鼎推究陰陽精氣返還刻漏不停雄黄喻土而定四夷土者生金本土雄者男黄者土能偃水土是金火非關雄黄鼎主外上名五符世人不悟還丹本之父母錯用金銀爲母或爲鼎器故元氣不離於五五不離於元氣混其名即一辨其功即殊元氣者五才之君五才者元氣之臣君相臣臨而不可去也金丹用其元氣不越於五五者五符也五符者氣氣本無形因精而生内外含眞得餌不死不生金鼎藥之表轄表者氣也轄者鼎也鼎象雞子外白裏黄與汞相合是用白金爲器器不離於五五者土土者生金之土委曲相制似使無虞令水不逃溢戊己之功也訣曰提劍偃戈籠罩四方提劍者金精本氣五也偃其戈戟如水得土而不流是金死於土也大丹之基丹砂丹砂是鉛本生於土死亦歸依於土是用生丹砂土也世人知之有數鼎之異名有曰外神水曰華池曰神室曰匡郭曰表轄曰五氣曰白衣曰丹衣曰母舍曰金鼎曰神廬訣曰五氣者其大籠罩八隅小則潜藏一毫吐坤嘔輪出有入無訣曰流珠九轉化爲黄白自然相使一陰一陽日道須伏於金鼎中宫之功神通自在孕育制伏故云金鼎夫金丹天地日月元和之氣照曜潜運成爲丹砂砂中迥然而自生乃爲還丹如人育孕男女皆由父母陰陽精氣相成而有還丹象男女男生而覆女生而仰非但在生死亦如此但投於水雄者覆雌者仰天使其然非干父母教令金水在於鼎中象男女弄戲男上女下自得情意相符以成其道訣曰金丹雖得元基須知本父母養育制伏父者火之陽氣也父能發泄運動而成之母者土之陰氣也母能含育生之母主中宫黃黃者土是生金之土丹砂初分受氣依於土而生故云黃芽之本母也得陽而成得母而生故名土釜曰母土者五行之土生成土也水火木金土各居一方運動正位火來剋金土來剋水水者丹砂之子土者鼎火者運動相伐而成形得土相生土能制水本氣相感以成大道之宗故云知白守黑世人盡不知同類相從相生相剋相制以金生水以土爲鬼土填水不起戊己之功名曰五符金鼎知者無一焉地符火木之精訣曰地符火者火能爨熟萬物以育人民火者甲之本陽之元氣結媾交會同日月之精氣歸一無二甲之精火數二生數三成數九九者陽之極數陽氣也甲曰曾木曰青萬物之使東方青龍木木是火之父母火木之子孫震爲長男一爻生巽爲中男二爻生故火生辰巳離爲中女二爻生陽丙子寄位也木孕火制火必假木三者木之精正陽之道甲乙之位日天符信也能發泄萬物月陰符能生育萬物土陰符能生育萬物火地符能爨熟萬物金水元氣並同陰符能生育萬物直符手鏡喻日月六十四卦六爻發泄運動天符以成金丹餌之羽化子明之力也混元皇帝眞君歷代變名叙陰陽統略五行相類周易爻象直符參同如符若契觀察天地徘佪陰陽輪轉子午正位卯酉相望十一月一陽生萬物生也五月一陰生萬物結也春生秋殺自然之道也訣曰用火徴徴不失節候萬物自熟河車之義訣曰子者火候先在抽添一云河者北之位車者般載之義一云子是金河是水故曰子河車地符直卦節候進退圖訣曰本用四卦法日月四時直符循環一如車脚轉運陰陽成數造化載運萬物故在律紀月節有五六諱奉日使兼並六十四卦剛柔有表裏朔旦長直事至暮蒙當受晝夜各一卦用之次序既末主晦爽終即復更始進退爻象並在此直符從一至九金虎吐精用訣直符不載於此訣曰託附陰陽爻象六十四卦立喻也但發泄用火之時便是十一月用事受陽節候也十一月初九潜龍勿用地雷復豫直十二月九二見龍在田地澤臨萃直正月九三君子終日乾乾地天泰否直二月九四或躍在淵天雷無妄大壯直三月九五飛龍在天天澤履夫直四月上九亢龍有悔純乾直陽氣交騰右陽生六位極陽之卦亢龍大過法象於天故云自子終於巳五月一陰生天風姤小畜直六月二陰生天山遁大畜直七月三陰生天地否泰直八月四陰生風地觀昇直九月五陰生山地剥謙直十月六陰生純坤直右陰生六位極陰之卦氣潜伏法象於地故曰自午訖於亥震主春木生三成八離主夏火生二成七訣曰證前十五日白月火木用事故七八也兌主秋金生四成九坎主冬水生一成六訣曰證後十五日黑月金水用事故九六也並是直符六爻用節卦翻譯氣候五行相剋之數故知七八數十五九六亦相應道自畢也一二三四五並是五行之基訣曰一者北方壬癸水二者南方丙丁火三者東方甲乙木四者西方庚辛金五者中央戊己土經曰父少而子老父者天鉛丹砂鉛也子者從父而出金黑鉛故父少而子老子不定父數世五水火金木土五行移易萬物五日一候五五二十五故父年二十五也子數不定子年般載運動不定故知父少而子老舉世不知萬物從五行而生成父母也用火訣曰六爻直符運卦用火斤兩從純坤起終於坤周而復始也訣曰一月换一鼎故用九鼎即止第十鼎任意消息用不用並得用之轉妙縁是生金之本氣也故云土釜土釜曰母母金鼎也訣曰其金鼎依運氣候十五日金性滅三十日成丹運至十月不用本土爲鼎子母脱胎九轉九鼎九者火用事鼎者母用事也凡丹象人從受氣後三百七十日而生九月是陰陽俱盛十月土王故子母相分故名脫胎還丹象人四氣足而生亦如嬰兒乳育三年大元氣足而成金丹乃爲黄礜變轉却歸北方黑色通透始得名大還世人不知之矣子是藥母是鼎感氣相生相産相伏相制相殺迭盛迭衰昇降在鼎飛伏上下陰陽相管交會吞食四物相薄君臣相臨土性生金性死火性滅水性涸四物者陽中陰陰中陽但以本土爲軸轄直符運動故有四物各居一方四物性並滅歸一返本故名金丹訣曰守運一年餌一兩半凡病不侵二年成白道可餌半兩三年大元氣足成赤道可餌一分住世死籍不録刀圭制汞爲白道五年麻子大餌七粒以刀圭點鐵及汞各一斤並成赤道守九年畢法餌三粒三尸九蠱盡出長生不死能化五金八石盡瓦礫等隨本色形成寳又用火法曰所立指喻爻象手鏡火記斤兩託附陰陽隱祕變化之機苗裔略同用之正訣假令十一月建子一陽生爻動火生數二成數七運動般載如車輪一月一陽生加至五月一陰生一月退一陽爻至十月歸於土終於坤周而復始金丹是日月運動自然成丹因燧人改火後聖用之同於天火造化至在更漏分眀節候用火斤兩運動漸漸如蒸四時年月刻漏足以成金丹火候所然如驅雞即走寬又不伏但依直符爻象即金水自伏六月陽終於巳十二月陰終於丑訣曰丹砂陽氣流珠之精是立乾坤運水火應天符合三才也金爲月精以處陰位汞含離氣以應陽爻天地之靈孕日月之精否極泰來陰盡陽生故云丹砂木精得金乃並三一之道三者火一者藥故名守一又云砂者藥金者鼎故云三道由一併在根蒂大道至理得門無砂二性温和無毒味辛元氣通靈萬物不枯名曰黑鉛黑鉛者砂中自然之液仰月抽出之液故云黑鉛入仰月配合爲夫妻陰魂合陽魄兩性自和同訣曰然用五行乾坤震巽直符孕育從建之初一陽生子午相應八八相通以推移刻漏日月五星寒暑來往晝陽夜陰交會四十五日一節節相臨陰陽調順潜伏運動輪還巡於六十四卦周而復始水火相從處無外物五金八石由人之造化五金五行也八石八卦也訣曰水得龍而爲雨火得人而運動陰陽氣用事萬物長龍行雨施萬物生還丹養育造化不越五行訣曰直符初發之時水淨不失時文不過九武不過九九者陽之極數三三如九大過之極陰生之首陰盡陽生皆順天道陰陽爲之運動若匀金水即順節候失序金水即亡運動如垂温抱卵受氣而生用事相生相殺如寒谷變春陰陽五行所生互用皆立喻者也訣曰精元氣本生於南方丙丁火離寄位二陽之中一陰生日之魂陰汞水也受氣之足移位北方壬癸水坎寄位二陰之中一陽生月之魄陽汞金也水則湛然不動無爲之體也火則炎動不已有爲之宗將有制無合成妙道故知金生於陰暗之處始初也是子午相應訣曰金入中宫太一庚城含育黄黑混其元精赤馬守黄烏蒼龍藉白虎制馭本類相從故曰參同又云坎離一二南北獨爲徑一者水二者火萬物因水而生因火而成火金相伐水土相剋以成大丹直符初發在子十一月從震而生四月火王極陽合退又從巽生二木漸順汞初伏雖乾未是火丹守運三節名丹砂五節名金砂一年名長砂一名小還丹二年名還魂丹一名中還丹一千日受氣足名黑獸大還金液丹餌之不死訣曰修金丹不悟玄理者蓋爲不悟丹砂是鉛造化根本迷迷相指錯用凡水銀凡鉛金銀雄黄曾青不知凡鉛是世銀之母雄是藥之子砂是鉛之母黄是土土是砂之父母曾屬甲火之父母青屬木位東方世人不悟錯用水銀凡金銀鉛雄黄曾青爲藥或爲鼎器或爲子母或鍊鉛取花及雜石爲藥自古至今未有得者夫道之根本神仙之道在於目前丹砂木精得土而生得土而死生滅不離於五行互用更爲父母相伐相生成形也訣曰氣能存生内丹也藥能固形外丹也服餌長生莫過於内外丹日月之華氣華氣者丹砂元和之氣並是性命之本除内外丹精外五金二青四黄雜石磁礜五礬等並不在議限訣曰只如水銀孤陰寡陽能腐骨搜髓金性損肝銀性損脾銅性損腎鉛錫損胃四黄大毒並有質性絶陽而損元和之氣但指於一金一石乃非凡金石也世間六水皆有大毒餌之縱目下未虞終爲大害丹砂如有傍小門制之能治世疾小益延駐不可長生法曰用硇硫雄曾四味爲器相伏即得如用諸毒藥抑遏感氣聚雜而成即不可餌也慎之訣曰凡鉛是世銀之母在礦受陽氣足性自伏火坯出即世銀是也訣曰水銀與丹砂中水銀形貌雖相似然象人男與女俱别丹砂象男太陽日之精魂能留人性命内自有水銀相制伏不與外水銀情合及外物抑遏而得故益人性命凡水銀象女太陰月之精魄能奪人性命孤陰寡陽有大毒不可餌也訣曰水銀陰陽性雖異同是天地之精象男女陰陽有異丹砂有傍小門制之即用凡鉛爲器匡郭成藥訣曰世人不知黄白之根基錯用凡水銀凡鉛金銀爲至藥殊不知汞生於鉛砂産於金金丹但知鉛本氣而成何得遺本存乎外物鉛者子丹之精也氣者母本土生精之土故名本鉛氣訣曰天鉛者硃鉛也金本從鉛中生即是子隱母胎又子藏於金中即是母隱子胎鉛者黃芽黃者土芽者砂土能生芽故云黄芽也鉛汞者本是七寳之良媒五金之筋髓解則百事俱通迷則百途並塞然鉛制汞能伏鉛鉛汞汞相成合爲黄白之道訣曰一陰一陽之爲道一金一石之爲丹石乗陽而熱金得陰而寒此乃魂魄相應理勢必然夫石液定魂金精定魄非陰陽感化諒九幽之可待故曰君子好逑淑女之良配河上姹女靈而最神得火即飛不見垢塵鬼隱龍匿莫知所存將欲制伏黄芽爲根儻不入黄芽獨燒水銀雖器厚盈尺固塞百重火動即飛莫之能止須臾去盡不見纖毫如鬼隱冥中龍匿水府縱有離婁之目亦不能睹蹤也使水不能東西黄芽之力也元君訣曰黄芽者五行甲子是也甲屬木木是陽之父母母屬地之氣冬至後一陽衝其日一陽生萌芽受氣於母土名甲甲依土吐甲以生芽芽依於母母曰坤即是癸之黃芽六甲之位囚死休廢同其一甲在癸而絶位五穀五菓草木茂榮萬類胎卵藥物人民皆從黄芽生陽氣氤氲運動地爲胎息爲氣萬物以春夏發泄爲黃芽秋冬收歛同成熟各歸其色及本味不改舊容故名還丹之義反本也夫人改常必死物改色必壞乃知藥物徑運動陽氣般載不改舊容與天火同造化還丹受氣反本也陽氣照曜凝結自然之道故曰黄芽世人莫知天地三光清濁初分人民萬物皆從黄芽不越五行而生黄芽者萌芽伸屈始初也因陽而結因陰而生陰陽交接當受氣之時初爲混沌清濁之後始有黄芽在甲曰黃在句曰萌在伸曰芽故名黄芽乃知元不離於五行五行金木水火土也水曰潤下火曰炎上金曰從革木曰曲直土曰稼穡訣曰天地大道萬物乆長元和之氣長生不過日月星辰陰陽五行盡依土而生終歸於土隨四時更變然有期亦是自然之道假令毛脂含受太陽氣一千年化爲伏神又一千年爲琥珀又一千年爲水精皆是日月之華氣照曜成精又假如蟾蜍弄月蚌蛤有珠並是採弄含受太陰月華之氣成胎爲珠其珠是月之陰魄所結二味並堪服食偏治肺氣驚邪健忘以木蜜爲丸如麻子大食後津下三丸蚌珠能制汞夫人内脩道德元和之氣沖融脩養含道結精爲珠自然長生珠居於赤水中赤水血也假令禽獸蟲蟻魚蟹蟄伏者皆得元和之氣所託存生非關父母教令得悟之哉自固其志音聲相和物類相感有無相貫陰陽抱而全其大道二氣和合有無相别無有相成成其眞道也河車者五金之主亦北之位水能渡車般載萬物輪還不住是陽居陰位陰合陽精金汞相得故曰河車也元和之道祖立天地調陰陽四時行焉萬物生焉受氣曰命最靈曰人人福莫大於生禍莫大於死既惡其死又欲其生爲失道而不得生也勉之勉之且余所注類異諸家義合正經理契大道論卦象則火候爲先擇陰陽則藥物爲正參者雜也水土金三物同爲一家如符若契契其一理故曰參同訣曰萬物非日月不生金水非火土不成金水則變化之元火土乃陰陽之始天地混沌之時天地默然雖未變化終爲萬物之根金白水黑相會氣中狀如雞子陽燧以取火非日不生光犬戎以火鏡盛艾化之須臾則火出象還丹陰陽金火大唐國内時亦有之書不盡言言不盡意然則聖人之意其不可見乎若用凡水銀爲金丹者妄人也言硃砂未得理者不知道也即去眞遠矣或曰用凡水銀凡鉛而爲之者無靈蓋不足悟水銀眞鉛之正體唯讚凡鉛之功效不說水銀之精妙必以一事而成不得兼而美之耳若用凡鉛爲藥即去道乖遠若安水銀爲金丹即不是眞法若悟之者正以水銀火鉛爲主但得鉛本氣遇五而成丹不遺本也若悟元化一施妙用無極若以外物爲情則性不可合以水銀代汞則鉛不可親性不可合三宫其可固乎鉛不可親八石豈能妙乎金重如本初金不失其重日月形如常陰汞不失斤兩是日與月金重不失本初我命在鉛鉛不失天鉛還丹成金億萬年鉛者二汞本一體無二故曰天鉛莫壞我鉛令我命全莫破我車廢我還家鉛者砂中自生曰鉛車者是砂中抽出液曰車鉛中有金金中有還見寳别寳賢人得道鉛者砂中自生日金得火運動月還眞人言金精黄芽制水不流溢之力玄水也金精黄芽同名自生鉛也水者是砂中抽出之液用鉛不用鉛不用得長年用鉛者是硃砂自有鉛相制不用鉛者是世銀之母凡鉛也鉛若不眞至道難親鉛若是眞不失家臣鉛若不眞凡鉛也鉛若是眞殊鉛也寧修鉛中金是丹砂中自生曰金不修金中寳是凡水銀也聖人明立喻以示後學也鼎鼎是何鼎是用生丹砂之本土爲鼎也藥藥是何藥是用丹砂中自流生汞爲藥也火鉛是丹砂被日月運動自生出汞爲火鉛也水銀汞之異名是丹砂陽氣未足抽出爲水銀也水銀在丹砂中含甲精氣未足曰女火鉛在丹砂中含甲精氣足迴然自生曰男男女相配陰陽自得其情更無異類也金丹本乎一物而無外物入之陽氣運動故名三一之道白者金精黑者水精其歸一無二聖人託喻於周易爻象運動成丹制伏皆時逆而用之即魂魄喪亡如日月交蝕失位不相賔伏聖人祕惜之不肯正論多有隱祕之言從此經訣差互多有不成有鄙之以失而起大怨者金鼎之訣宜慎守之凡藥合和見功難矣天道祕泄或隱言玄象或託附陰陽潜說人間言徴理妙群或自迷而不解自羲皇已來好道求長生者甚衆遇而得之者寡矣擅率胸臆而不鑒悟又不求師受自立方書求出世之方虚自勤苦名山大谷朽敗愚儒求不死者未見得之食五穀縱六情人在陽鬼在陰又不能驅役鬼神策使陰陽不得出世之丹倒皆死没於世寒舉綿求以自暖熱飲水而乗風馭凉生於陰陽之界五行所管食土之物死歸於土以身報土而返本也若非遇日月之華氣運轉其精液三一之還丹焉能度世行屍比肩若墜石投川往而不返淪没歸化實可悲夫若遇内外金丹餌之運形駐貌異常然可出陰陽之界五行不管死籍不録鬼神侍衛訣曰道書仙傳祕録丹經龍虎上清經五相類周易爻象參同契歌訣卷卷述聖人之意黄帝老子宣尼二十四聖諸仙並是得道之仙世人迷遇不會須修行始得之次有不顯名之士得而隱之者不一以爲無仙道者實愚迷哉所有歌録經訣爻象皆露枝條苗裔不說徑門自古至今皆須師受口訣而成非有分者不得而學矣傳得此訣者祕之寳之天道不可輕露泄矣養虎還自噬付與不道之人殃罰七代謫身爲下鬼長役鬼官可不懼哉得其賢人猶須探賾内行不二徴兆有分始可傳受仍先虔志啓告百靈分誓立券方可傳之切宜慎之修行不二至藥無雙夫人道合元理自然可遇必須勤苦疲勞無怨不可倉卒漁獵而得之遇眀師悟於一言大藥只有一門而三物水土金非人間水土金凡物等得之魂魄歸長生不死但行不二之心師必自至矣金丹内丹得門餌者不死與天地齊畢也叙訣長生號肘後訣以示後學不悟之者其造鼎並入金及直符用卦刻漏並不載於此知道者審而詳之不變色硫黄法取鴨子去黄白了以紙拭其中令淨其口須小候裏乾取黄細研以雞子白拌令浥浥入鴨子中以筯頭築令實滿口上以雞子白和胡粉固令密即以黄丹和雞子白爲泥泥鴨子周迴可厚二分許候乾以黄泥泥令厚二分曬乾又以鉛細細裹之可四五分已來三如之叢立於鐵臼中消鉛汁淋取一半候冷又淋以没頭頭上可厚五六寸即臼外如泥火爐法三處安火常令臼徴熱不令鉛銷至第十四日即大火令鉛銷銷即浮出收候冷開之已伏火其色不變可作伏汞砂子匱用一兩伏了者勾得半兩生者五日伏火亦堪服术方术一斛水清淨洗乾細擣爲末以清水二斛煮令爛以絹絞取汁於銅器中湯上蒸之又入白蜜一升乾棗去核爛研令皮肉相得取一升入术中攪令相入如脯狀日服如彈子大三四枚百病皆除萬惡不傷面有光澤耳目聰明三年顔如女子神仙不死又方术一斛淨洗乾擣爲末大棗四斗去核酒五斗和慢煎攪令成煎日服李子大三丸百病不傷面如童子耐寒凍通幽訣
